<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather WEB site</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" name="" id="search_input" spellcheck="false">
            <button><img src="./searc.webp" alt="search"></button>
        </div>
        <div class="weather"> 
             <div class="weather_display">
                <img src="./cloudy.jpg" alt="cloudy" style="width: 50%; height: 50%;">
                <p>1<sup>0</sup>C</p>
                <p class="counrty_name">somalia</p>
            </div>
            <div class="humidity_wind">
            <div class="humidty">
                <img src="./humidity.webp" alt="humidity"  style="width: 50px; height: 50px;">
                <span>9%</span>
                <p>Humidity</p>
            </div>
            <div class="wind">
                <img src="./wind.webp" alt="wind speed"  style="width: 50px; height: 50px;">
                <span>2.68 km/h</span>
                <p>Wind speed</p>
            </div>
            </div>

        </div>
    </div>
    <!--- the updated inner html temp city humudity wind-->

    <script src="./script.js"></script>
    
</body>
</html>
